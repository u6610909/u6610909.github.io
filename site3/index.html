<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mystery Button</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: #eee;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px #ff00ff;
    }

    button {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      background-color: #ff00ff;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 20px #ff00ffaa;
      transition: all 0.2s ease-in-out;
    }

    button:hover {
      transform: scale(1.1);
      background-color: #ff33ff;
    }

    p {
      margin-top: 2rem;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>⚠️ Do Not Press</h1>
  <button onclick="alert('You pressed it. Now you must deal with the consequences.')">
    Press the Mystery Button
  </button>
  <p>Absolutely nothing bad will happen. Probably.</p>
</body>
</html>
